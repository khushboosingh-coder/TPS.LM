version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tps_lm_db
    environment:
      POSTGRES_DB: tps_lm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tps_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tps_lm_api
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tps_lm
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - tps_network
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: tps_lm_web
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tps_network
    command: npm run dev

volumes:
  postgres_data:

networks:
  tps_network:
    driver: bridge
